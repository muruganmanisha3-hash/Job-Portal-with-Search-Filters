<!DOCTYPE html>
<html>
<head>
    <title>Job Portal</title>
    <style>
        body {
            font-family: Arial;
            margin: 30px;
            background: #f4f4f4;
        }

        input, select {
            padding: 10px;
            margin: 10px;
            width: 200px;
        }

        .job {
            background: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            box-shadow: 0 0 5px gray;
        }
    </style>
</head>
<body>

<h2>Job Portal</h2>

<input type="text" id="search" placeholder="Search Job Title">

<select id="location">
    <option value="">All Locations</option>
    <option>Chennai</option>
    <option>Bangalore</option>
    <option>Hyderabad</option>
</select>

<select id="type">
    <option value="">All Types</option>
    <option>Full Time</option>
    <option>Part Time</option>
    <option>Internship</option>
</select>

<div id="jobs"></div>

<script>
const jobs = [
    {
        title: "Software Engineer",
        company: "ABC Tech",
        location: "Chennai",
        type: "Full Time"
    },
    {
        title: "Web Developer",
        company: "XYZ Solutions",
        location: "Bangalore",
        type: "Internship"
    },
    {
        title: "Java Developer",
        company: "TechSoft",
        location: "Hyderabad",
        type: "Full Time"
    },
    {
        title: "UI Designer",
        company: "Design Hub",
        location: "Chennai",
        type: "Part Time"
    }
];

function displayJobs(list) {
    const container = document.getElementById("jobs");
    container.innerHTML = "";

    if (list.length === 0) {
        container.innerHTML = "<h3>No jobs found</h3>";
        return;
    }

    list.forEach(job => {
        container.innerHTML += `
            <div class="job">
                <h3>${job.title}</h3>
                <p><b>Company:</b> ${job.company}</p>
                <p><b>Location:</b> ${job.location}</p>
                <p><b>Type:</b> ${job.type}</p>
            </div>
        `;
    });
}

function filterJobs() {
    const keyword = document.getElementById("search").value.toLowerCase();
    const location = document.getElementById("location").value;
    const type = document.getElementById("type").valuhttps://github.com/muruganmanisha3-hash/Job-Portal-with-Search-Filters/tree/maine;

    const filtered = jobs.filter(job =>
        job.title.toLowerCase().includes(keyword) &&
        (location === "" || job.location === location) &&
        (type === "" || job.type === type)
    );

    displayJobs(filtered);
}

document.getElementById("search").addEventListener("keyup", filterJobs);
document.getElementById("location").addEventListener("change", filterJobs);
document.getElementById("type").addEventListener("change", filterJobs);

displayJobs(jobs);
</script>

</body>
</html>
